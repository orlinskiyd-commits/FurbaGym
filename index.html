<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PE Gym · NNY 3000">
<meta name="theme-color" content="#0a0614">
<title>Planet Express Gym · 3000</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;700;900&family=Share+Tech+Mono&display=swap"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box}
/* ═══════════════════════════════════════════
   PLANET EXPRESS GYM · NEW NEW YORK · 3000
   Цвета: вселенная Futurama
   ═══════════════════════════════════════════ */
:root {
  /* Фон — глубокий космос NNY */
  --void:   #0a0614;
  --s1:     #0f0a1e;
  --s2:     #160f2a;
  --s3:     #1e1535;
  --s4:     #271c42;
  --bd:     #342554;
  --bd2:    #4d3a7a;

  /* Fry — фирменный оранжевый (куртка Фрая) */
  --fry:    #ff6d00;
  --fry30:  rgba(255,109,0,.30);
  --fry15:  rgba(255,109,0,.15);
  --fry08:  rgba(255,109,0,.08);

  /* Leela — фиолетовый (волосы Лилы) */
  --leela:  #c084fc;
  --l20:    rgba(192,132,252,.20);
  --l08:    rgba(192,132,252,.08);
  /* Leela combat — бирюзовый (боевой костюм, сила) */
  --leela-c:#00c9b1;
  --lc20:   rgba(0,201,177,.20);
  --lc08:   rgba(0,201,177,.08);

  /* Bender — серебряный/зелёный (тело Бендера) */
  --bender: #4ade80;
  --b20:    rgba(74,222,128,.20);
  --b08:    rgba(74,222,128,.08);

  /* Zoidberg — красный (панцирь Зойдберга) */
  --zoid:   #f87171;
  --z20:    rgba(248,113,113,.20);

  /* Amy — розовый (спортивный костюм Эми) */
  --amy:    #f472b6;
  --a20:    rgba(244,114,182,.20);
  --a08:    rgba(244,114,182,.08);

  /* Тяжёлые нагрузки — Robot Devil red */
  --heavy-c:  #ff4444;
  --heavy-bg: rgba(255,68,68,.12);
  /* Средние — Professor green */
  --med-c:    #4ade80;
  --med-bg:   rgba(74,222,128,.12);
  /* Лёгкие — Kif blue */
  --lite-c:   #93c5fd;
  --lite-bg:  rgba(147,197,253,.12);

  --t1: #f0eaff;
  --t2: #a898cc;
  --t3: #7a6aa0;
  --t4: #594d78;
  --red: #ff4444;

  --font-d: 'Orbitron', system-ui, sans-serif;
  --font-b: 'Exo 2', system-ui, sans-serif;
  --font-m: 'Share Tech Mono', ui-monospace, monospace;

  --r4:4px; --r8:8px; --r12:12px; --r16:16px; --r20:20px; --r99:100px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100dvh}body{background:var(--void);color:var(--t1);font-family:var(--font-b);min-height:100dvh;overflow-x:hidden}

/* Фон — туманность + темнота Нью-Нью-Йорка */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 35% at 10% 15%, rgba(255,109,0,.05) 0%,transparent 60%),
    radial-gradient(ellipse 45% 35% at 90% 80%, rgba(0,201,177,.06) 0%,transparent 60%),
    radial-gradient(ellipse 35% 50% at 50% 50%, rgba(74,222,128,.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

#app{max-width:430px;margin:0 auto;padding-bottom:calc(64px + env(safe-area-inset-bottom));position:relative;z-index:1}
button{font-family:var(--font-b);cursor:pointer}

.d1{font-family:var(--font-d);font-size:1.8rem;line-height:1}
.d2{font-family:var(--font-d);font-size:1.3rem;line-height:1.1}
.d3{font-family:var(--font-d);font-size:1rem;line-height:1.2}
.label{font-size:.6rem;font-family:var(--font-b);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3)}
.mono{font-family:var(--font-m)}

.card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r20)}
.card-glow-fry{border-color:var(--fry30);box-shadow:0 0 24px var(--fry08),inset 0 1px 0 var(--fry15)}
.card-glow-l{border-color:var(--lc20);box-shadow:0 0 24px var(--lc08),inset 0 1px 0 var(--lc20)}

.btn-primary{width:100%;padding:13px 20px;border:none;border-radius:var(--r16);font-family:var(--font-d);font-size:.82rem;color:#000;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:transform .12s,box-shadow .12s}
.btn-primary:active{transform:scale(.97)}
.btn-primary.orange{background:var(--fry);box-shadow:0 4px 24px var(--fry30)}
.btn-primary.green{background:var(--bender);box-shadow:0 4px 24px var(--b20)}
.btn-primary.purple{background:var(--leela-c);box-shadow:0 4px 24px var(--lc20);color:#fff}

.btn-ghost{padding:8px 16px;border:1px solid var(--bd2);border-radius:var(--r8);background:var(--s3);color:var(--t2);font-size:.72rem;font-weight:700}
.btn-ghost:active{background:var(--s4)}

#nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:rgba(10,6,20,.94);backdrop-filter:blur(20px) saturate(1.4);border-top:1px solid var(--bd);display:flex;flex-direction:column;z-index:100}
#nav-inner{display:flex;width:100%;}
#nav-safe{height:env(safe-area-inset-bottom);background:rgba(10,6,20,.94)}
.nb{flex:1;padding:10px 0 11px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);transition:color .15s}
.nb.active{color:var(--fry);position:relative}
.nb.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--fry);border-radius:0 0 2px 2px;box-shadow:0 0 8px var(--fry30)}
.nb-icon{font-size:1.2rem}
.nb-label{font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pe-launch{
  /* Старт — короткий рывок вверх (тяга) */
  0%   { transform: translateY(0px) }
  /* Быстрый набор высоты */
  15%  { transform: translateY(-6px) }
  28%  { transform: translateY(-13px) }
  /* Вышли на орбиту — зависание с микродрожью двигателя */
  40%  { transform: translateY(-16px) }
  44%  { transform: translateY(-15px) }
  48%  { transform: translateY(-16.5px) }
  52%  { transform: translateY(-15.5px) }
  56%  { transform: translateY(-16px) }
  /* Зависание стабилизировалось */
  62%  { transform: translateY(-16px) }
  /* Начало снижения — медленное, корабль «тормозит» */
  72%  { transform: translateY(-11px) }
  85%  { transform: translateY(-4px) }
  /* Мягкая посадка — небольшой отскок */
  93%  { transform: translateY(-1.5px) }
  97%  { transform: translateY(-0.5px) }
  100% { transform: translateY(0px) }
}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 20px var(--fry15)}50%{box-shadow:0 0 32px var(--fry30)}}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fade-up .3s ease both}
@keyframes slide-in{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slide-out{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-18px)}}
@keyframes ex-expand{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ex-card .cluster-wrap{animation:ex-expand .2s ease both}
@keyframes num-pop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes screen-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes inp-shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.inp-error{border-color:var(--red)!important;box-shadow:0 0 10px rgba(248,113,113,.35)!important;animation:inp-shake .45s ease}
.screen{animation:screen-in .25s ease both}
@keyframes badge-shine{0%{filter:brightness(1)}50%{filter:brightness(1.4)}100%{filter:brightness(1)}}
.ex-card.ex-done .ex-num{animation:badge-shine .5s ease}
@keyframes twinkle{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.6;transform:scale(1.5)}}
@keyframes bender-glow{0%,100%{text-shadow:0 0 8px var(--bender)}50%{text-shadow:0 0 20px var(--bender),0 0 40px rgba(74,222,128,.4)}}
.bender-text{animation:bender-glow 2.5s ease-in-out infinite}

/* Planet Express logo ring */
.pe-ring{
  width:80px;height:80px;flex-shrink:0;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  will-change:transform;
  position:relative;
  overflow:visible;
}
.pe-ring-inner{
  width:80px;height:80px;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  animation:pe-launch 7s cubic-bezier(0.25,0.1,0.25,1) infinite;
  will-change:transform;
  filter:drop-shadow(0 0 14px rgba(255,109,0,.55)) drop-shadow(0 6px 18px rgba(0,0,0,.6));
  overflow:visible;
}
.pe-ring-inner img{
  width:96px;height:96px;object-fit:contain;
  margin-left:-8px;
}

.pbar{height:5px;background:var(--s4);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s ease}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r99);font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid transparent}
.badge-heavy {background:var(--heavy-bg);color:var(--heavy-c);border-color:rgba(255,68,68,.3)}
.badge-medium{background:var(--med-bg);  color:var(--med-c);  border-color:rgba(74,222,128,.3)}
.badge-light {background:var(--lite-bg); color:var(--lite-c); border-color:rgba(147,197,253,.3)}

.inp{width:100%;box-sizing:border-box;padding:12px 16px;background:var(--s3);border:1px solid var(--bd);border-radius:var(--r12);color:var(--t1);font-size:.9rem;font-family:var(--font-b);outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--fry30);box-shadow:0 0 0 3px var(--fry08)}

.day-btn{padding:10px 0;border:1.5px solid var(--bd);border-radius:var(--r8);background:var(--s3);color:var(--t3);font-weight:700;font-size:.68rem;transition:all .15s}
.day-btn.sel{border-color:var(--fry);background:var(--fry08);color:var(--fry)}

.screen{padding:20px 16px}
.sticky-hdr{position:sticky;top:0;z-index:20;background:rgba(10,6,20,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:8px 16px 8px}

.ex-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r20);overflow:hidden;margin-bottom:10px;transition:border-color .2s,opacity .3s}
.ex-card.expanded{border-color:var(--bd2)}
.ex-card.ex-done{opacity:.55;transition:opacity .3s}
.ex-hdr-btn{width:100%;background:none;border:none;padding:12px 16px;display:flex;align-items:center;gap:12px;text-align:left}
.ex-num{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid var(--bd);background:var(--s3);color:var(--t3);transition:all .2s}
.ex-num.active{border-color:var(--fry);color:var(--fry);background:var(--fry08)}
.ex-num.done{border-color:var(--bender);color:var(--bender);background:var(--b08);box-shadow:0 0 8px var(--b08)}

.cluster-wrap{padding:0 16px 14px}
.cluster{background:var(--s3);border:1px solid var(--bd);border-radius:var(--r16);padding:12px;margin-bottom:8px}
.cluster.done{background:rgba(74,222,128,.05);border-color:var(--b20)}
.cluster-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.sets-row{display:flex;gap:8px;flex-wrap:wrap}
.set-btn{width:46px;height:46px;border-radius:12px;border:2px solid var(--bd);background:var(--s4);color:var(--t3);font-weight:700;font-size:.85rem;transition:all .15s;display:flex;align-items:center;justify-content:center}
.set-btn.done{background:var(--b08);border-color:var(--bender);color:var(--bender);box-shadow:0 0 10px var(--b08)}
@keyframes set-pop{0%{transform:scale(.88)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.set-btn.done{animation:set-pop .25s ease}
@keyframes set-ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}
.set-btn .ripple{position:absolute;border-radius:50%;background:rgba(74,222,128,.4);width:100%;height:100%;animation:set-ripple .4s ease-out forwards;pointer-events:none}
.set-btn{position:relative;overflow:hidden}
.set-btn:active{transform:scale(.92)}

.metrics-row{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd);background:rgba(0,0,0,.15)}
.metric-chip{flex:1;background:var(--s4);border-radius:var(--r8);padding:6px 8px;text-align:center;border:none}
.metric-val{font-family:var(--font-m);font-size:.95rem;font-weight:700}
.metric-lbl{font-size:.5rem;font-family:var(--font-b);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-cell{background:var(--s3);border:1px solid var(--bd);border-radius:var(--r12);padding:14px}
.metric-cell-val{font-family:var(--font-m);font-size:1.35rem;font-weight:700}
.metric-cell-lbl{font-size:.55rem;font-family:var(--font-b);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

.sched-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-top:1px solid var(--bd)}
.sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sum-screen{min-height:100vh;padding:32px 16px 100px}
.sum-hero{text-align:center;padding:32px 16px 24px}
.hist-item{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r16);overflow:hidden;margin-bottom:10px;position:relative}
.hist-accent{position:absolute;left:0;top:0;bottom:0;width:4px}
.hist-hdr-btn{width:100%;background:none;border:none;padding:12px 16px 12px 20px;display:flex;align-items:center;font-family:var(--font-b);text-align:left}
.hist-body{border-top:1px solid var(--bd);padding:10px 16px}
.empty-state{text-align:center;padding:60px 24px}
.section-hdr{padding:8px 16px;border-bottom:1px solid var(--bd);background:var(--s3)}
.correction-card{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.25);border-radius:var(--r16);padding:18px;margin-bottom:14px}

/* Цитаты персонажей */
.quote-fry{border-left:3px solid var(--fry);background:var(--fry08);color:var(--fry);padding:10px 14px;border-radius:0 var(--r12) var(--r12) 0;font-size:.7rem;font-style:italic;line-height:1.65}
.quote-fry b{font-style:normal;color:var(--fry)}
.quote-bender{border-left:3px solid var(--bender);background:var(--b08);color:var(--bender);padding:10px 14px;border-radius:0 var(--r12) var(--r12) 0;font-size:.7rem;font-style:italic;line-height:1.65}
.quote-bender b{font-style:normal}
.quote-prof{border-left:3px solid var(--leela-c);background:var(--lc08);color:var(--leela-c);padding:10px 14px;border-radius:0 var(--r12) var(--r12) 0;font-size:.7rem;font-style:italic;line-height:1.65}
.quote-prof b{font-style:normal}

.rm-overlay{position:fixed;inset:0;z-index:999;background:rgba(10,6,20,.9);display:flex;align-items:center;justify-content:center;padding:20px;animation:fade-up .25s ease}
.rm-modal{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r16);padding:24px 20px;max-width:360px;width:100%;box-shadow:0 0 40px rgba(255,109,0,.15)}
.rm-modal-ttl{font-family:var(--font-d);font-size:.95rem;color:var(--fry);margin-bottom:10px}
.rm-modal-txt{font-size:.76rem;color:var(--t2);line-height:1.65;margin-bottom:20px}
.rm-modal-btns{display:flex;flex-direction:column;gap:8px}

#planet-bg{position:fixed;right:-60px;top:25%;z-index:0;width:220px;height:220px;border-radius:50%;background:conic-gradient(from 0deg,rgba(255,109,0,.06),rgba(0,201,177,.05),rgba(74,222,128,.04),rgba(255,109,0,.06));animation:spin 25s linear infinite;pointer-events:none;filter:blur(2px)}
</style>
</head>
<body>
<div id="planet-bg"></div>
<div id="app"></div>
<script>
// ════════════════════════════════════════════
// PLANET EXPRESS GYM · NEW NEW YORK · 3000
// «Good news, everyone! Мы качаемся!»
// ════════════════════════════════════════════

// ── УПРАЖНЕНИЯ ──────────────────────────────
// День 1: Присед тяжёлый + Жим средний
// День 2: Жим тяжёлый + Присед СРЦ
const EX = {
  // День 1
  squat:   {name:'Присед',              hint:'штанга · ноги',         pmOf:'squat', ratio:1.00, step:2.5, icon:'🦾'},
  bench:   {name:'Жим лёжа',            hint:'штанга · грудь',        pmOf:'bench', ratio:1.00, step:2.5, icon:'🤖'},
  row:     {name:'Тяга гантели в наклоне', hint:'гантель одна рука · спина', pmOf:'bench', ratio:0.35, step:1.0, minW:4, icon:'🛸'},
  press:   {name:'Армейский жим',       hint:'штанга · плечи',        pmOf:'bench', ratio:0.60, step:2.5, icon:'☄️'},
  lunge:   {name:'Выпады',              hint:'гантели · ноги',        pmOf:'squat', ratio:0.25, step:2.0, icon:'🌍'},
  hammer:  {name:'Молотки',          hint:'гантели · бицепс',      pmOf:'bench', ratio:0.18, step:1.0, icon:'🦀'},
  // День 2
  bench2:  {name:'Жим лёжа',            hint:'штанга · грудь',        pmOf:'bench', ratio:0.95, step:2.5, icon:'🤖'},
  squat2:  {name:'Присед с паузой СРЦ', hint:'штанга · ноги',         pmOf:'squat', ratio:0.85, step:2.5, icon:'🦿'},
  dbell:   {name:'Жим гантелей',        hint:'гантели · грудь',       pmOf:'bench', ratio:0.23, step:1.0, icon:'💪'},
  cable:   {name:'Тяга блока к поясу',   hint:'блок узкий хват · спина',  pmOf:'bench', ratio:0.50, step:2.5, icon:'🪝'},
  rdl:     {name:'Румынская тяга',      hint:'штанга · задняя цепь',  pmOf:'squat', ratio:0.60, step:2.5, icon:'🌑'},
  french:  {name:'Французский жим',     hint:'изогнутый гриф · трицепс', pmOf:'bench', ratio:0.25, step:2.5, minW:10,  icon:'👾'},
};

const EX_JOKES = {
  squat: [
    '🦾 Бендер: «Качание — примитивная разновидность сгибания. Но я снисхожу до твоего уровня.»',
    '🦾 Бендер: «Сравните свою жизнь с моей, а потом убейте себя! Но сначала присядьте.»',
    '🦾 Зойдберг: «Вы готовы оперировать, доктор? — С удовольствием, но сначала нужно потренироваться!»',
    '🦾 Бендер: «Выше нос, кусок мяса. Или хотя бы центр тяжести.»',
    '🦾 Бендер: «Как и многие жизненные проблемы, эту можно решить сгибанием. Присед — сгибание. Логично.»',
  ],
  bench: [
    '🤖 Бендер: «Укуси мой блестящий металлический зад!» — Заслужи это. Сначала пожми.',
    '🤖 Бендер: «Я хочу жить! Я ещё много чего не украл!» — Укради ещё один подход.',

    type: isDay1 ? 'heavy' : 'volume',

    warmup: isDeload

        : 'Кардио 5 мин · Динамическая растяжка · Активация кора',

      {id:'bench',  load:'medium',

      {id:'press',  load:'medium',

      {id:'lunge',  load:'light',
        cl:[{p:0.40,r:10,n:2+Math.floor(week/4)}]},

const DAY_NAMES   = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTH_SHORT = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

// ── МАТЕМАТИКА ──────────────────────────────
function growPM(base,weeks,corr){return base*Math.pow(1+corr/100,weeks);}
function getExPM(exId,bench,squat){
  const e=EX[exId];if(!e)return 0;
  return(e.pmOf==='squat'?squat:bench)*e.ratio;
}
function roundW(w,step,minW){
  step=step||2.5;
  const r=Math.round(w/step)*step;
  const mn=minW!=null?minW:(step>=2.5?20:1); // штанга мин 20 кг (гриф), гантели мин 1 кг
  return Math.max(r,mn);
}
function exMetrics(clusters){
  let T=0,K=0;
  clusters.forEach(c=>{T+=c.weight*c.reps*c.doneSets;K+=c.reps*c.doneSets;});
  return{tonnage:T,kpsh:K,avg:K>0?T/K:0};
}
function totalMetrics(exercises){
  let T=0,K=0;
  exercises.forEach(ex=>{const m=exMetrics(ex.clusters);T+=m.tonnage;K+=m.kpsh;});
  return{tonnage:T,kpsh:K,avg:K>0?T/K:0};
}
function buildSession(sessionN,bench,squat){
  const sess=SESSIONS[sessionN%24];
  return{
    ...sess,
    exercises:sess.exercises.map(exDef=>{
      const pm=getExPM(exDef.id,bench,squat);
      return{id:exDef.id,load:exDef.load,pm,
        clusters:exDef.cl.map(c=>({p:c.p,weight:roundW(pm*c.p,EX[exDef.id].step,EX[exDef.id].minW),reps:c.r,numSets:c.n,doneSets:0}))};
    }),
  };
}

// ── РАСПИСАНИЕ ───────────────────────────────
function sessionDate(n){
  const days=(S.trainingDays||[]).slice().sort((a,b)=>a-b);
  if(!S.startDate||!days.length)return null;
  let d=new Date(S.startDate);d.setHours(0,0,0,0);
  let cnt=-1;
  if(days.includes(d.getDay())){cnt=0;if(cnt===n)return new Date(d);}
  for(let i=0;i<3650;i++){
    d=new Date(d.getTime()+86400000);
    if(days.includes(d.getDay())){cnt++;if(cnt===n)return new Date(d);}
  }
  return null;
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function fmtDate(d){if(!d)return'—';const dd=d instanceof Date?d:new Date(d);return DAY_NAMES[dd.getDay()]+' '+dd.getDate()+' '+MONTH_SHORT[dd.getMonth()];}
function fmtFull(d){if(!d)return'—';const dd=d instanceof Date?d:new Date(d);return DAY_NAMES[dd.getDay()]+', '+dd.getDate()+' '+MONTH_SHORT[dd.getMonth()]+' '+dd.getFullYear();}
function shiftSchedule(actualStr){
  const planned=sessionDate(S.sessionCount-1);if(!planned)return;
  const actual=new Date(actualStr);actual.setHours(0,0,0,0);
  const diff=Math.round((actual-planned)/86400000);if(!diff)return;
  const ns=new Date(S.startDate);ns.setDate(ns.getDate()+diff);
  S.startDate=ns.toISOString().slice(0,10);saveSave();
}

const KEY='pe_gym_v1';

  try{

    for(const k of ['benigym_c137_v1','lms_v5','benigym_pro']){
      const old=localStorage.getItem(k);
      if(old){const d=JSON.parse(old);localStorage.setItem(KEY,old);return d;}

    return null;
  }catch{return null;}
}

  startDate:S.startDate,trainingDays:S.trainingDays,
  sessionCount:S.sessionCount,history:S.history
}));}catch(e){}}

// ── ДЕЙСТВИЯ ────────────────────────────────
function saveSetup(){
  const bench=parseFloat(document.getElementById('si_bench').value);
  const squat=parseFloat(document.getElementById('si_squat').value);
  const corr=parseFloat(document.getElementById('si_corr').value);
  const date=document.getElementById('si_date').value;
  if(!bench||bench<=0||!squat||squat<=0){
    // Подсветить пустые поля
    const bInp=document.getElementById('si_bench');
    const sInp=document.getElementById('si_squat');
    if(!bench||bench<=0){
      bInp.classList.remove('inp-error');
      void bInp.offsetWidth; // reflow для перезапуска анимации
      bInp.classList.add('inp-error');
      setTimeout(()=>bInp.classList.remove('inp-error'),500);
    }
    if(!squat||squat<=0){
      sInp.classList.remove('inp-error');
      void sInp.offsetWidth;
      sInp.classList.add('inp-error');
      setTimeout(()=>sInp.classList.remove('inp-error'),500);
    }
    showToast('🤖 Бендер: «Без цифр ты статистически не существуешь. Введи — и может станешь кем-то.»');
    return;
  }
  const hasCycle=(S.sessionCount>0)||(S.history&&S.history.length>0);
  const pmChanged=(bench!==S.benchPM||squat!==S.squatPM);
  if(hasCycle&&pmChanged){
    S._pendingSetup={bench,squat,corr:corr>0?corr:0.5,date:date||todayStr()};
    showModal('⚠️ Профессор Фарнсворт предупреждает',
      '«Бог мой, надо что-то предпринять… но я уже в пижаме.» Всё же придётся: цикл начнётся заново, история <b style="color:var(--red)">сбросится</b>.',
      [{lbl:'🛸 Да, с новыми ПМ',cls:'btn-primary orange',fn:'confirmPMChange()'},
       {lbl:'↩️ Назад в Нью-Нью-Йорк',cls:'btn-ghost',fn:'cancelPMChange()'}]);
    return;
  }
  _applySetup(bench,squat,corr>0?corr:0.5,date||todayStr());
}
function saveDraft(){
  const b=document.getElementById('si_bench');
  if(b)S._draft={bench:b.value,squat:document.getElementById('si_squat')?.value||'',corr:document.getElementById('si_corr')?.value||'',date:document.getElementById('si_date')?.value||''};
}
function toggleDay(d){
  saveDraft();
  const i=S.trainingDays.indexOf(d);
  if(i>=0){if(S.trainingDays.length>1)S.trainingDays.splice(i,1);}
  else{if(S.trainingDays.length>=2){alert('Программа рассчитана на 2 тренировки в неделю.');return;}S.trainingDays.push(d);}
  saveSave();render();
}
function startWorkout(){
  if(!S.benchPM||!S.squatPM){S.screen='setup';render();return;}
  const n=S.sessionCount;
  const week=Math.floor(n/2);
  const bench=growPM(S.benchPM,week,S.corrPct);
  const squat=growPM(S.squatPM,week,S.corrPct);
  const sess=buildSession(n,bench,squat);
  const plannedDate=sessionDate(n);
  S.workout={
    sessionN:n,startTime:Date.now(),
    plannedDate:plannedDate?plannedDate.toISOString().slice(0,10):todayStr(),
    actualDate:todayStr(),expEx:0,
    warmup:sess.warmup,type:sess.type,
    exercises:sess.exercises,
  };
  S.screen='workout';render();window.scrollTo(0,0);startTimer();
}
function cancelWorkout(){stopTimer();S.workout=null;S.screen='home';render();}
function toggleEx(i){if(!S.workout)return;S.workout.expEx=S.workout.expEx===i?null:i;render();}
function markSet(ei,ci,add){
  if(!S.workout)return;
  const c=S.workout.exercises[ei].clusters[ci];
  if(add&&c.doneSets<c.numSets)c.doneSets++;
  if(!add&&c.doneSets>0)c.doneSets--;
  const ex=S.workout.exercises[ei];
  if(ex.clusters.every(cl=>cl.doneSets===cl.numSets)){
    showToast(DONE_Q[_dq++%DONE_Q.length]);
    if(ei<S.workout.exercises.length-1)setTimeout(()=>{if(S.workout){S.workout.expEx=ei+1;render();}},380);
  }
  render();
  // Ripple на кнопке после render
  if(add){
    setTimeout(()=>{
      const btns=document.querySelectorAll('.ex-card .set-btn.done');
      if(btns.length){
        const btn=btns[btns.length-1];
        const r=document.createElement('span');
        r.className='ripple';
        btn.appendChild(r);
        setTimeout(()=>r.remove(),400);
      }
    },20);
  }
}
function finishWorkout(){
  stopTimer();
  const elapsed=Math.floor((Date.now()-S.workout.startTime)/1000);
  const total=totalMetrics(S.workout.exercises);
  const dateMatch=S.workout.actualDate===S.workout.plannedDate;
  const rec={
    id:Date.now(),date:S.workout.actualDate,plannedDate:S.workout.plannedDate,
    sessionN:S.workout.sessionN,duration:Math.floor(elapsed/60),
    week:Math.floor(S.workout.sessionN/2),total,
    exercises:S.workout.exercises.map(ex=>({id:ex.id,pm:ex.pm,load:ex.load,...exMetrics(ex.clusters)})),
  };
  S.summary={rec,needsCorrection:!dateMatch};
  S.sessionCount++;S.history=[rec,...S.history].slice(0,300);
  S.workout=null;saveSave();render();
}

}

function homeHTML(){
  const n=S.sessionCount;
  const week=Math.floor(n/2);
  const bench=growPM(S.benchPM,week,S.corrPct);
  const squat=growPM(S.squatPM,week,S.corrPct);
  const sess=SESSIONS[n%24];
  const today=todayDate();
  const plannedNext=sessionDate(n);
  const isToday=plannedNext&&plannedNext.toDateString()===today.toDateString();
  const isPast=plannedNext&&plannedNext<today;
  const pNote=planetNote(n);

  const topBanner=(!S.benchPM||!S.squatPM)
    ?'<div style="background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.35);border-radius:var(--r12);padding:12px 16px;margin-bottom:14px;font-size:.76rem;color:var(--red)">⚠️ ПМ не заданы — нажми <b>🔧 ПМ</b></div>'
    :'<div class="quote-prof" style="margin-bottom:14px"><b>⚗️ Проф. Фарнсворт:</b> '+profQ()+'</div>';

function workoutHTML(){
  const W=S.workout;
  const tSets=W.exercises.reduce((a,ex)=>a+ex.clusters.reduce((b,c)=>b+c.numSets,0),0);
  const dSets=W.exercises.reduce((a,ex)=>a+ex.clusters.reduce((b,c)=>b+c.doneSets,0),0);
  const allDone=dSets===tSets;
  const elapsed=Math.floor((Date.now()-W.startTime)/1000);
  const totals=totalMetrics(W.exercises);
  const pct=tSets?Math.round(dSets/tSets*100):0;
  const dateOk=W.actualDate===W.plannedDate;
  const restComments={
    heavy:'⏸ 2–3 мин · 🤖 Бендер: «Бездельничаете? Я тоже. Но у меня есть оправдание — я робот.»',
    medium:'⏸ 90 сек · 🍕 Фрай: «Подождать 90 секунд? Я ждал 1000 лет в криокамере. Я справлюсь.»',
    light:'⏸ 60 сек · 😮‍💨 Киф: «(вздыхает) ...отдохни. Ты заслужил. (ещё вздох)»',
  };
  let exCards='';
  W.exercises.forEach((ex,ei)=>{
    const meta=EX[ex.id];
    const doneEx=ex.clusters.reduce((a,c)=>a+c.doneSets,0);
    const totalEx=ex.clusters.reduce((a,c)=>a+c.numSets,0);
    const exDone=doneEx===totalEx;
    const exp=W.expEx===ei;
    const lc=loadColor(ex.load);
    let numStyle=exDone?'done':doneEx>0?'active':'';
    let body='';
    if(exp){
      let clusters='';
      ex.clusters.forEach((c,ci)=>{
        const clDone=c.doneSets===c.numSets;
        let sets='';
        for(let si=0;si<c.numSets;si++){
          const done=si<c.doneSets;
          sets+='<button class="set-btn'+(done?' done':'')+'" onclick="markSet('+ei+','+ci+','+(done?0:1)+')">'+(done?'✓':(si+1))+'</button>';
        }
        // Иерархия: вес главный → повторения второстепенные → всё остальное мелко
        clusters+='<div class="cluster'+(clDone?' done':'')+'">'
          // Строка 1: вес ОГРОМНЫЙ + % мелко справа
          +'<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px">'
          +'<div style="line-height:1">'
          +'<div style="font-size:.58rem;font-family:var(--font-b);color:'+(clDone?'var(--bender)':lc)+';font-weight:700;letter-spacing:.06em;margin-bottom:2px">'+pctStr(c.p)+' от ПМ</div>'
          +'<div style="font-family:var(--font-d);font-size:1.4rem;font-weight:900;color:'+(clDone?'var(--bender)':lc)+';line-height:1">'+c.weight+'<span style="font-size:1rem;font-weight:400;margin-left:4px">кг</span></div>'
          +'</div>'
          +'<div style="text-align:right;padding-bottom:4px"><div style="font-size:.52rem;color:var(--t3);font-family:var(--font-b)">ПМ упр.</div><div class="mono" style="font-size:.75rem;color:var(--t3)">'+ex.pm.toFixed(0)+' кг</div></div>'
          +'</div>'
          // Строка 2: повторения + счётчик подходов
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
          +'<div style="background:'+(clDone?'var(--b08)':'var(--s3)')+';border:2px solid '+(clDone?'var(--bender)':'var(--bd2)')+';border-radius:var(--r12);padding:8px 16px;display:flex;align-items:baseline;gap:6px">'
          +'<span style="font-family:var(--font-d);font-size:.95rem;font-weight:700;color:'+(clDone?'var(--bender)':lc)+'">'+c.reps+'</span>'
          +'<span style="font-size:.65rem;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.08em">повт</span>'
          +'</div>'
          +'<div style="font-size:.7rem;color:var(--t3);font-family:var(--font-b)">'+c.doneSets+' / '+c.numSets+' подх</div>'
          +'</div>'
          // Строка 3: кнопки подходов
          +'<div class="sets-row">'+sets+'</div>'
          +'</div>';
      });
      const mtr=exMetrics(ex.clusters);
      const mtrRow=mtr.kpsh>0?'<div class="metrics-row"><div class="metric-chip"><div class="metric-val" style="color:'+lc+'">'+mtr.tonnage.toFixed(0)+'</div><div class="metric-lbl">Тоннаж кг</div></div><div class="metric-chip"><div class="metric-val" style="color:'+lc+'">'+mtr.kpsh+'</div><div class="metric-lbl">КПШ</div></div><div class="metric-chip"><div class="metric-val" style="color:'+lc+'">'+mtr.avg.toFixed(1)+'</div><div class="metric-lbl">Ср.вес кг</div></div></div>':'';
      const joke=exJoke(ex.id,W.sessionN);
      body='<div class="cluster-wrap">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span class="badge badge-'+loadClass(ex.load)+'">'+loadEmoji(ex.load)+' '+loadLabel(ex.load)+'</span><span style="font-size:.65rem;color:var(--t3)">'+esc(meta.hint)+'</span></div>'
        +(joke?'<div style="font-size:.58rem;color:var(--t3);margin-bottom:10px;font-style:italic">'+joke+'</div>':'')
        +clusters+mtrRow
        +'<div style="margin-top:8px;padding:8px 12px;background:var(--s3);border-radius:var(--r8);font-size:.62rem;color:var(--t3);border:1px solid var(--bd)">'+(restComments[ex.load]||restComments.medium)+'</div>'
        +'</div>';
    }
    exCards+='<div class="ex-card'+(exp?' expanded':'')+(exDone&&!exp?' ex-done':'')+'"><button class="ex-hdr-btn" onclick="toggleEx('+ei+')">'
      +'<div class="ex-num '+numStyle+'" style="'+(exDone?'animation:badge-shine .5s ease':'')+'">  '+(exDone?'✓':(ei+1))+'</div>'
      +'<div style="flex:1"><div style="font-size:.84rem;font-weight:700;color:var(--t1)">'+meta.icon+' '+esc(meta.name)+'</div><div style="font-size:.6rem;color:var(--t3);margin-top:2px">'+esc(meta.hint)+'</div></div>'
      +'<div style="text-align:right"><div class="mono" style="font-size:.8rem;font-weight:700;color:'+lc+'">'+ex.pm.toFixed(0)+' кг</div><div style="font-size:.54rem;color:var(--t3);margin-top:2px">'+doneEx+'/'+totalEx+' подх</div></div>'
      +'</button>'+body+'</div>';
  });
  const fin=allDone
    ?'<div style="position:fixed;bottom:0;left:0;right:0;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));background:rgba(10,6,20,.96);backdrop-filter:blur(20px);border-top:1px solid var(--fry30)">'
      +'<div style="font-size:.62rem;color:var(--bender);text-align:center;margin-bottom:8px;font-style:italic">🤖 Бендер: «Все упражнения выполнены. Я почти уважаю тебя. ПОЧТИ.»</div>'
      +'<button class="btn-primary orange" onclick="finishWorkout()" style="animation:glow-pulse 1.5s ease-in-out infinite;white-space:normal;word-break:break-word;padding:14px 16px;line-height:1.3;font-size:.8rem">🛸 ДОСТАВКА НА '+esc(planet(W.sessionN)).toUpperCase()+' ВЫПОЛНЕНА!</button></div>'
    :'';
  return '<div style="min-height:100vh;background:var(--void)">'
    +'<div class="sticky-hdr" style="padding:10px 16px 8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="font-size:.56rem;font-weight:700;color:var(--t3);letter-spacing:.1em">🪐 '+planet(W.sessionN).toUpperCase()+' · №'+(W.sessionN+1)+'/24</div>'
    +H(!dateOk,'<div style="font-size:.5rem;color:var(--red);margin-left:4px">⚠️ '+fmtDate(new Date(W.plannedDate))+'</div>')+'</div>'
    +'<div style="display:flex;align-items:center;gap:6px"><span id="tmr" class="mono" style="font-size:.75rem;color:var(--t2)">'+timeStr(elapsed)+'</span>'
    +'<button class="btn-ghost" style="padding:4px 10px;font-size:.6rem" onclick="cancelWorkout()">Отмена</button></div></div>'
    +'<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">'
    +'<div class="d3" style="font-size:.9rem">'+fmtFull(new Date())+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;font-size:.6rem;color:var(--t3)">'
    +'<span>'+dSets+'/'+tSets+' подх'+(allDone?' <span style="color:var(--bender)">✓</span>':'')+'</span>'
    +H(totals.kpsh>0,'<span class="mono" style="color:var(--fry)">'+totals.tonnage.toFixed(0)+' кг</span>')+'</div></div>'
    +'<div class="pbar" style="margin-bottom:6px"><div class="pbar-fill" style="width:'+pct+'%;background:var(--fry);box-shadow:0 0 8px var(--fry30)"></div></div>'
    +'<div style="font-size:.55rem;color:var(--t4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
    +'<span style="color:var(--leela-c);font-weight:700">Лила: </span>'+esc(W.warmup)+'</div>'
    +'</div>'
    +'<div style="padding:12px 16px '+(allDone?130:16)+'px">'+exCards+'</div>'
    +fin+'</div>';
}

function summaryHTML(){
  const{rec,needsCorrection,corrected}=S.summary;
  if(needsCorrection){
    const diff=Math.round((new Date(rec.date)-new Date(rec.plannedDate))/86400000);
    return '<div class="sum-screen fade-up"><div class="sum-hero">'
      +'<div style="font-size:3rem;margin-bottom:12px">📅</div>'

      +'<div style="font-size:.7rem;color:var(--t3)">Хермес обнаружил несоответствие в форме 7G</div></div>'
      +'<div class="correction-card"><div class="label" style="color:var(--red);margin-bottom:12px">📋 Хермес Конрад: Несовпадение дат</div>'

      +'<div style="display:flex;justify-content:space-between;font-size:.76rem"><span style="color:var(--t3)">Фактически</span><b style="color:var(--fry)">'+fmtFull(new Date(rec.date))+'</b></div>'
      +'<div style="margin-top:10px;font-size:.65rem;color:var(--t3);font-style:italic">«Согласно Бюро Доставки и Физической Подготовки — отклонение в '+(Math.abs(diff))+' дн. требует заполнения формы.»</div></div>'

      +'<div style="font-size:.66rem;color:var(--t3);margin-bottom:16px;line-height:1.5">Все будущие доставки сдвинутся на '+(diff>0?'+':'')+diff+' дн. Хермес выдаст новый маршрутный лист.</div>'

      +'<button onclick="skipCorrect()" style="width:100%;padding:12px;background:var(--s3);border:1px solid var(--bd);border-radius:var(--r12);color:var(--t2);font-family:var(--font-b);font-size:.82rem">Оставить как есть</button></div></div>';
  }
  const exRows=rec.exercises.map(ex=>{
    const meta=EX[ex.id];const lc=loadColor(ex.load||'medium');
    return '<div style="padding:10px 0;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:.78rem;font-weight:700">'+meta.icon+' '+esc(meta.name)+'</div>'
      +'<div style="font-size:.58rem;color:var(--t3);margin-top:2px"><span class="badge badge-'+loadClass(ex.load||'medium')+'" style="font-size:.5rem">'+loadEmoji(ex.load||'medium')+' '+loadLabel(ex.load||'medium')+'</span><span style="margin-left:6px">ПМ '+ex.pm.toFixed(1)+' кг · КПШ '+ex.kpsh+'</span></div></div>'
      +'<div style="text-align:right"><div class="mono" style="font-size:.82rem;font-weight:700;color:'+lc+'">'+ex.tonnage.toFixed(0)+' кг</div></div></div>';
  }).join('');
  const nextD=sessionDate(S.sessionCount);
  const t=rec.total.tonnage;

  else if(t>1800){charReview='«Wow! Помнишь в S03E07 когда Фрай поднял всех? Нет? Ну, это было примерно так же круто!»';charColor='var(--fry)';charIcon='🍕 Фрай:';}
  else if(t>1000){charReview='«По форме 28B Бюро Достижений — твой результат ЗАСЧИТАН! Ямайский бобслей одобряет!»';charColor='var(--amy)';charIcon='📋 Хермес:';}
  else{charReview='«Зойдберг тоже хотел поднять штангу! У Зойдберга нет штанги. Зойдберг поднял Зойдберга. Зойдберг горд за тебя!»';charColor='var(--zoid)';charIcon='🦞 Зойдберг:';}

    ?'<div style="margin-bottom:10px;padding:10px 14px;background:rgba(244,114,182,.06);border:1px solid rgba(244,114,182,.2);border-radius:var(--r12);font-size:.66rem;color:var(--amy);font-style:italic">🎭 <b>Calculon:</b> «...длинная пауза для эффекта... Ты ПРИШЁЛ В ДЕНЬ ПО РАСПИСАНИЮ. Это была твоя лучшая роль. Номинируй себя.»</div>'
    :'';
  const isFinal=rec.sessionN===23;
  const momNote=isFinal
    ?'<div style="margin-bottom:12px;padding:12px 16px;background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.3);border-radius:var(--r12)"><div class="label" style="color:var(--red);margin-bottom:6px">👩‍🦳 ФИНАЛЬНАЯ ДОСТАВКА · MomCorp HQ</div><div style="font-size:.7rem;color:var(--t2);line-height:1.6;font-style:italic">«Ты завершил 24 доставки. Даже я, Mom, вынуждена признать — это впечатляет. Не думай что это делает нас друзьями. Начни новый цикл.» — Mom</div></div>'
    :'';
  const SARCASM=['Доставка выполнена. Хороших новостей нет.','Технически ты выжил. Это что-то.','Профессор доволен. Почти.','Планета Земля чуть безопаснее. Чуть.','Хороших новостей нет. Зато есть тоннаж.','Зойдберг аплодирует. Клешнями. Ему больно.','Слабые места задокументированы. Бендер смотрел.','Доставлено. Непонятно как, но доставлено.'];
  const sarcLine=SARCASM[rec.sessionN%SARCASM.length];

    }).join('');
    const dateOk=rec.date===rec.plannedDate;
    return '<div class="hist-item"><div class="hist-accent" style="background:var(--fry)"></div>'
      +'<button class="hist-hdr-btn" onclick="toggleHist('+ri+')" style="width:100%"><div style="flex:1"><div style="font-weight:700;font-size:.82rem">'+fmtDate(new Date(rec.date))+' · Доставка '+(rec.sessionN+1)+'</div><div style="font-size:.6rem;color:var(--t3);margin-top:3px">'+rec.duration+' мин · <span class="mono">'+rec.total.tonnage.toFixed(0)+' кг</span> · ZAI: '+(rec.total.tonnage/31).toFixed(1)+H(!dateOk,'<span style="color:var(--red)"> · план: '+fmtDate(new Date(rec.plannedDate))+'</span>')+'</div></div><span style="font-size:.7rem;color:var(--t3);margin-left:8px">▾</span></button>'
      +'<div id="hb'+ri+'" style="display:none" class="hist-body">'+exR+'</div></div>';
  }).join('');
  return '<div class="screen">'
    +'<div class="d3" style="margin-bottom:4px">Маршрутный лист</div>'
    +'<div style="font-size:.62rem;color:var(--t3);margin-bottom:12px">'+S.history.length+' доставок · Planet Express</div>'
    +'<div class="quote-bender" style="margin-bottom:16px"><b>🤖 Бендер:</b> «В 99.7% случаев люди бросают после первой недели. Факт. Ты — аномалия. Это комплимент. Почти.»</div>'
    +items+'</div>';
}

function progressHTML(){
  const week=Math.floor(S.sessionCount/2);
  const bench=growPM(S.benchPM,week,S.corrPct);
  const squat=growPM(S.squatPM,week,S.corrPct);

  const _seen=new Set();
  const exRows=Object.entries(EX).filter(([id,meta])=>{
    if(_seen.has(meta.name))return false;
    _seen.add(meta.name);return true;
  }).map(([id,meta])=>{
    const pm=getExPM(id,bench,squat);
    return '<div style="padding:10px 16px;border-top:1px solid var(--bd);display:flex;align-items:center"><div style="flex:1"><div style="font-size:.78rem;font-weight:700">'+meta.icon+' '+esc(meta.name)+'</div><div style="font-size:.56rem;color:var(--t3);margin-top:1px">'+esc(meta.hint)+' · ×'+meta.ratio+'</div></div><div class="mono" style="font-size:.9rem;font-weight:700;color:var(--fry)">'+roundW(pm,EX[id].step,EX[id].minW).toFixed(1)+' кг</div></div>';
  }).join('');

  const forecast=[1,4,8,12].map(w=>{
    const b=roundW(growPM(S.benchPM,w,S.corrPct),2.5).toFixed(1);
    const s=roundW(growPM(S.squatPM,w,S.corrPct),2.5).toFixed(1);
    const isCurrent=w===week||w===week+1;
    return '<div style="background:'+(isCurrent?'rgba(255,109,0,.08)':'var(--s3)')+';border:1px solid '+(isCurrent?'rgba(255,109,0,.3)':'var(--bd)')+';border-radius:var(--r12);padding:10px 12px;display:flex;justify-content:space-between;align-items:center">'
      +'<div style="font-size:.58rem;color:var(--t3);font-family:var(--font-b)">НЕД '+(w+1)+(isCurrent?' <span style="color:var(--fry)">← сейчас</span>':'')+'</div>'
      +'<div style="display:flex;gap:12px">'
      +'<div style="text-align:right"><div style="font-size:.48rem;color:var(--t4)">жим</div><div class="mono" style="font-size:.82rem;font-weight:700;color:var(--fry)">'+b+'</div></div>'
      +'<div style="text-align:right"><div style="font-size:.48rem;color:var(--t4)">присед</div><div class="mono" style="font-size:.82rem;font-weight:700;color:var(--leela-c)">'+s+'</div></div>'
      +'</div></div>';
  }).join('');


  const histChart=S.history.length>1?(() => {
    const data=S.history.slice(0,10).reverse();
    const max=Math.max(...data.map(r=>r.total.tonnage));
    const W2=Math.min(398,window.innerWidth-32);const H=60;
    const pts=data.map((r,i)=>{
      const x=20+(i/(Math.max(data.length-1,1)))*(W2-40);
      const y=H-10-(r.total.tonnage/max)*(H-20);
      return[x,y];
    });
    const path=pts.map((p,i)=>(i?'L'+p[0]+','+p[1]:'M'+p[0]+','+p[1])).join(' ');
    return '<div class="card" style="padding:14px 16px;margin-bottom:12px"><div class="label" style="margin-bottom:8px;color:var(--fry)">📈 Тоннаж последних доставок</div><svg width="'+W2+'" height="'+H+'" viewBox="0 0 '+W2+' '+H+'"><defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff6d00" stop-opacity=".35"/><stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/></linearGradient></defs><path d="'+path+' L'+pts[pts.length-1][0]+','+H+' L'+pts[0][0]+','+H+' Z" fill="url(#tg)"/><path d="'+path+'" fill="none" stroke="#ff6d00" stroke-width="2" stroke-linejoin="round"/>'
      +pts.map(p=>'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="#ff6d00"/>').join('')
      +'</svg></div>';
  })():'';

  return '<div class="screen">'
    +'<div style="background:linear-gradient(135deg,rgba(255,109,0,.08),rgba(0,201,177,.05));border:1px solid rgba(255,109,0,.2);border-radius:var(--r16);padding:16px;margin-bottom:16px">'
    +'<div style="font-size:.55rem;color:var(--t3);letter-spacing:.15em;font-family:var(--font-b);margin-bottom:10px">⚗️ ОТЧЁТ ПРОФЕССОРА · НЕД '+(week+1)+' · MADISON CUBE GARDEN</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'
    +'<div style="background:rgba(255,109,0,.07);border:1px solid rgba(255,109,0,.2);border-radius:var(--r12);padding:12px">'
    +'<div style="font-size:.52rem;color:var(--t3);margin-bottom:4px;font-family:var(--font-b)">ЖИМ ЛЁЖА · 1ПМ</div>'
    +'<div style="font-family:var(--font-d);font-size:1.6rem;font-weight:900;color:var(--fry);line-height:1">'+roundW(bench,2.5).toFixed(1)+'<span style="font-size:.7rem;font-weight:400"> кг</span></div>'
    +'<div style="font-size:.5rem;color:var(--t4);margin-top:3px">база '+S.benchPM+' · +'+S.corrPct+'%/нед</div>'
    +'</div>'
    +'<div style="background:rgba(0,201,177,.07);border:1px solid rgba(0,201,177,.2);border-radius:var(--r12);padding:12px">'
    +'<div style="font-size:.52rem;color:var(--t3);margin-bottom:4px;font-family:var(--font-b)">ПРИСЕД · 1ПМ</div>'
    +'<div style="font-family:var(--font-d);font-size:1.6rem;font-weight:900;color:var(--leela-c);line-height:1">'+roundW(squat,2.5).toFixed(1)+'<span style="font-size:.7rem;font-weight:400"> кг</span></div>'
    +'<div style="font-size:.5rem;color:var(--t4);margin-top:3px">база '+S.squatPM+' · нед '+(week+1)+'/12</div>'
    +'</div></div>'
    +'<div style="font-size:.58rem;color:var(--t4);font-style:italic;line-height:1.5">⚗️ «'+S.corrPct+'% в неделю — это не медленно, это ЭВОЛЮЦИЯ. Я запатентовал процесс в 2987 году.»</div>'
    +'</div>'
    +'<div style="margin-bottom:16px;background:var(--s3);border:1px solid var(--bd);border-radius:var(--r12);padding:12px 16px">'    +'<div style="font-size:.52rem;color:var(--t3);letter-spacing:.12em;margin-bottom:8px;font-family:var(--font-b)">📊 СОСТОЯНИЕ ЦИКЛА</div>'    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'    +'<div style="flex:1;height:6px;background:var(--s4);border-radius:99px;overflow:hidden">'    +'<div style="height:100%;border-radius:99px;background:'+(isDeloadSession(S.sessionCount)?'var(--bender)':week<6?'var(--fry)':week<10?'var(--leela-c)':'var(--zoid)')+';width:'+(Math.min(S.sessionCount/24*100,100))+'%;transition:width .5s ease"></div>'    +'</div>'    +'<div style="font-size:.6rem;color:var(--t3);white-space:nowrap">'+(S.sessionCount)+'/24</div>'    +'</div>'    +'<div style="font-size:.58rem;color:'+(isDeloadSession(S.sessionCount)?'var(--bender)':week<6?'var(--fry)':week<10?'var(--leela-c)':'var(--zoid)')+'">'+(isDeloadSession(S.sessionCount)?'🔄 Делод-неделя · восстановление · снижен объём':week<6?'🟠 Фаза роста · нагрузка в норме':week<10?'🩵 Пиковая фаза · следи за самочувствием':'🔴 Финальный блок · не пропускай сон')+'</div>'    +'</div>'    +histChart
    +'<div class="card" style="margin-bottom:12px;overflow:hidden"><div class="section-hdr"><div class="label" style="color:var(--fry)">🛸 Текущие рабочие веса</div></div>'+exRows+'</div>'
    +'<div class="card" style="padding:14px 16px;margin-bottom:12px"><div class="label" style="color:var(--leela-c);margin-bottom:12px">📈 Прогноз ПМ</div>'+forecast+'</div>'
    +'<div class="card" style="padding:14px 16px"><div class="label" style="margin-bottom:12px">📐 Формулы Профессора</div>'
    +[['Тоннаж','Σ(вес × повт × подходы)'],['КПШ','Σ(повт × подходы)'],['Ср.вес','Тоннаж ÷ КПШ'],['ПМ рост','ПМ × (1 + '+S.corrPct+'%)^нед'],['ZAI™','Тоннаж ÷ 31 щупальце'],['Slurm RS™','Тоннаж ÷ Время (мин)']].map(([t,d])=>'<div style="display:flex;gap:12px;margin-bottom:8px;align-items:flex-start"><div class="mono" style="font-size:.66rem;color:var(--fry);min-width:60px">'+t+'</div><div style="font-size:.63rem;color:var(--t3);line-height:1.5">'+d+'</div></div>').join('')
    +'</div>'
    +'<div style="padding:10px 14px;background:rgba(74,222,128,.04);border:1px solid rgba(74,222,128,.15);border-radius:var(--r12);font-size:.62rem;color:var(--bender);font-style:italic;line-height:1.6">'
    +'🤖 Бендер: «Прогресс — это хорошо. Потому что иначе зачем всё это? Я спрашиваю философски. Не жди ответа.»</div></div>';
}

function navHTML(a){
  return '<nav id="nav"><div id="nav-inner">'+[['home','🛸','NNY'],['history','📦','Журнал'],['progress','⚗️','Профессор']].map(([s,ic,l])=>'<button class="nb'+(a===s?' active':'')+'" onclick="navTo(\''+s+'\')"><span class="nb-icon">'+ic+'</span><span class="nb-label">'+l+'</span></button>').join('')+'</div><div id="nav-safe"></div></nav>';
}

function render(){
  const app=document.getElementById('app');
  if(S.summary){app.innerHTML=summaryHTML();return;}
  if(S.screen==='workout'&&S.workout){app.innerHTML=workoutHTML();return;}
  if(S.screen==='setup'){app.innerHTML=setupHTML();return;}
  let c='';
  if(S.screen==='home'){checkCycleComplete();c=homeHTML();}
  if(S.screen==='history')c=historyHTML();
  if(S.screen==='progress')c=progressHTML();
  app.innerHTML=c+navHTML(S.screen);
}

// Звёзды
setTimeout(function(){
  const bg=document.createElement('div');
  bg.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden';
  bg.innerHTML=Array.from({length:50},()=>{
    const x=(Math.random()*100).toFixed(1),y=(Math.random()*100).toFixed(1);
    const s=Math.random()>.7?2:1,o=(0.1+Math.random()*.35).toFixed(2);
    const d=(3+Math.random()*5).toFixed(1),dl=(Math.random()*6).toFixed(1);
    return '<div style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+s+'px;height:'+s+'px;border-radius:50%;background:white;opacity:'+o+';animation:twinkle '+d+'s ease-in-out '+dl+'s infinite"></div>';
  }).join('');
  document.body.appendChild(bg);
},300);

render();
</script>
</body>
</html>
